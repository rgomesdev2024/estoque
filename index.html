<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Supabase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;}
.low-stock{background:#ffe5e5 !important;}
.unidades-alerta{
    background:#dc3545 !important;
    color:white !important;
    font-weight:bold;
    text-align:center;
}
.badge-alerta{background:#dc3545;}
</style>
</head>
<body>

<div class="container mt-4">

<h3>📦 Controle de Estoque (Supabase)</h3>

<div class="card p-3 mb-3">
<div class="row g-2">
<div class="col-md-3">
<input id="nome" class="form-control" placeholder="Produto">
</div>
<div class="col-md-2">
<input id="estoque" type="number" class="form-control" placeholder="Estoque (g)">
</div>
<div class="col-md-2">
<input id="minimo" type="number" class="form-control" placeholder="Mínimo (g)">
</div>
<div class="col-md-2">
<input id="uso" type="number" class="form-control" placeholder="Uso por unidade (g)">
</div>
<div class="col-md-2">
<button class="btn btn-primary w-100" onclick="adicionar()">Adicionar</button>
</div>
</div>
</div>

<div class="card p-3">
<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Produto</th>
<th>Estoque</th>
<th>Mínimo</th>
<th>Uso</th>
<th>Unidades</th>
<th>+</th>
<th>-</th>
<th>X</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://lpmhnbmjcwtcpqdozkux.supabase.co";
const SUPABASE_KEY = "lpmhnbmjcwtcpqdozkux";

/* ✅ Forma correta Supabase v2 */
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

const tabela = document.getElementById("tabela");

async function carregar(){
    const { data, error } = await supabaseClient
        .from("produtos")
        .select("*")
        .order("created_at");

    if(error){
        console.error(error);
        return;
    }

    render(data);
}

function render(produtos){
    tabela.innerHTML = "";

    produtos.forEach(p=>{
        let unidades = Math.floor(p.estoque / p.uso);
        let estoqueBaixo = p.estoque <= p.minimo;

        tabela.innerHTML += `
        <tr class="${estoqueBaixo ? 'low-stock':''}">
        <td>
            <strong>${p.nome}</strong>
            ${estoqueBaixo ? '<span class="badge badge-alerta ms-2">Estoque Baixo</span>':''}
        </td>
        <td>${Number(p.estoque).toFixed(2)} g</td>
        <td>${p.minimo} g</td>
        <td>${p.uso} g</td>
        <td class="${estoqueBaixo ? 'unidades-alerta':'text-success fw-bold text-center'}">
            ${unidades}
        </td>
        <td><button class="btn btn-success btn-sm" onclick="entrada('${p.id}', ${p.estoque})">+</button></td>
        <td><button class="btn btn-warning btn-sm" onclick="saida('${p.id}', ${p.estoque})">-</button></td>
        <td><button class="btn btn-danger btn-sm" onclick="remover('${p.id}')">X</button></td>
        </tr>
        `;
    });
}

async function adicionar(){
    let nome = document.getElementById("nome").value;
    let estoque = parseFloat(document.getElementById("estoque").value);
    let minimo = parseFloat(document.getElementById("minimo").value) || 0;
    let uso = parseFloat(document.getElementById("uso").value);

    if(!nome || !estoque || !uso) 
        return alert("Preencha corretamente");

    const { error } = await supabaseClient
        .from("produtos")
        .insert([{ nome, estoque, minimo, uso }]);

    if(error){
        console.error(error);
        return alert("Erro ao inserir");
    }

    document.querySelectorAll("input").forEach(i=>i.value="");
    carregar();
}

async function entrada(id, atual){
    let valor = parseFloat(prompt("Quantidade (g):"));
    if(!valor) return;

    const { error } = await supabaseClient
        .from("produtos")
        .update({ estoque: atual + valor })
        .eq("id", id);

    if(error) console.error(error);

    carregar();
}

async function saida(id, atual){
    let valor = parseFloat(prompt("Quantidade (g):"));
    if(!valor) return;

    let novo = atual - valor;
    if(novo < 0) novo = 0;

    const { error } = await supabaseClient
        .from("produtos")
        .update({ estoque: novo })
        .eq("id", id);

    if(error) console.error(error);

    carregar();
}

async function remover(id){
    const { error } = await supabaseClient
        .from("produtos")
        .delete()
        .eq("id", id);

    if(error) console.error(error);

    carregar();
}

carregar();

</script>

</body>
</html>
