<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque por Gramas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}
.card{
    border-radius:12px;
}
.low-stock{
    background-color:#ffe5e5 !important;
}
.unidades-alerta{
    background-color:#dc3545 !important;
    color:white !important;
    font-weight:bold;
    text-align:center;
}
.badge-alerta{
    background:#dc3545;
}
</style>
</head>
<body>

<div class="container mt-4">

<h2 class="mb-4">📦 Controle de Estoque (GitHub Pages)</h2>

<div class="card p-3 mb-4 shadow-sm">
<h5>Cadastrar Produto</h5>

<div class="row g-2">
<div class="col-md-3">
<input type="text" id="nome" class="form-control" placeholder="Nome do Produto">
</div>

<div class="col-md-2">
<input type="number" id="estoque" class="form-control" placeholder="Estoque (g)">
</div>

<div class="col-md-2">
<input type="number" id="minimo" class="form-control" placeholder="Estoque mínimo (g)">
</div>

<div class="col-md-2">
<input type="number" id="uso" class="form-control" placeholder="Uso por unidade (g)">
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100" onclick="adicionarProduto()">Adicionar</button>
</div>
</div>
</div>

<div class="card p-3 shadow-sm">
<table class="table table-bordered align-middle">
<thead class="table-dark">
<tr>
<th>Produto</th>
<th>Estoque (g)</th>
<th>Mínimo (g)</th>
<th>Uso (g)</th>
<th>Unidades Possíveis</th>
<th>Entrada</th>
<th>Saída</th>
<th>Excluir</th>
</tr>
</thead>
<tbody id="tabelaProdutos"></tbody>
</table>
</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("estoque_produtos")) || [];

function salvar(){
    localStorage.setItem("estoque_produtos", JSON.stringify(produtos));
}

function adicionarProduto(){
    let nome = document.getElementById("nome").value.trim();
    let estoque = parseFloat(document.getElementById("estoque").value);
    let minimo = parseFloat(document.getElementById("minimo").value);
    let uso = parseFloat(document.getElementById("uso").value);

    if(!nome || isNaN(estoque) || isNaN(uso)){
        alert("Preencha corretamente os campos obrigatórios.");
        return;
    }

    produtos.push({
        nome,
        estoque,
        minimo: minimo || 0,
        uso
    });

    limparCampos();
    salvar();
    renderizar();
}

function limparCampos(){
    document.getElementById("nome").value="";
    document.getElementById("estoque").value="";
    document.getElementById("minimo").value="";
    document.getElementById("uso").value="";
}

function entrada(index){
    let valor = parseFloat(prompt("Quantidade de entrada (g):"));
    if(!isNaN(valor) && valor > 0){
        produtos[index].estoque += valor;
        salvar();
        renderizar();
    }
}

function saida(index){
    let valor = parseFloat(prompt("Quantidade de saída (g):"));
    if(!isNaN(valor) && valor > 0){
        produtos[index].estoque -= valor;
        if(produtos[index].estoque < 0){
            produtos[index].estoque = 0;
        }
        salvar();
        renderizar();
    }
}

function remover(index){
    if(confirm("Deseja remover o produto?")){
        produtos.splice(index,1);
        salvar();
        renderizar();
    }
}

function renderizar(){
    let tabela = document.getElementById("tabelaProdutos");
    tabela.innerHTML="";

    produtos.forEach((p,index)=>{

        let unidades = p.uso > 0 ? Math.floor(p.estoque / p.uso) : 0;
        let estoqueBaixo = p.estoque <= p.minimo;

        let classeLinha = estoqueBaixo ? "low-stock" : "";
        let classeUnidades = estoqueBaixo ? "unidades-alerta" : "text-success fw-bold text-center";

        tabela.innerHTML+=`
        <tr class="${classeLinha}">
        <td>
            <strong>${p.nome}</strong>
            ${estoqueBaixo ? '<span class="badge badge-alerta ms-2">Estoque Baixo</span>' : ''}
        </td>
        <td>${p.estoque.toFixed(2)} g</td>
        <td>${p.minimo} g</td>
        <td>${p.uso} g</td>
        <td class="${classeUnidades}">${unidades}</td>
        <td><button class="btn btn-success btn-sm" onclick="entrada(${index})">+</button></td>
        <td><button class="btn btn-warning btn-sm" onclick="saida(${index})">-</button></td>
        <td><button class="btn btn-danger btn-sm" onclick="remover(${index})">X</button></td>
        </tr>
        `;
    });
}

renderizar();

</script>

</body>
</html>
