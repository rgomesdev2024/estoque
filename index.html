<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estoque Delivery</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#333;
color:white;
}

.alerta{
background:#ffb3b3;
}

button{
padding:6px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>📦 Dashboard Estoque</h2>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<h2>➕ Cadastrar Insumo</h2>

<div class="card">

<input id="nomeInsumo" placeholder="Nome">
<input id="unidade" placeholder="un / g">
<input id="estoque" placeholder="Estoque">
<input id="minimo" placeholder="Mínimo">
<input id="custo" placeholder="Custo">

<button onclick="cadastrarInsumo()">Salvar</button>

</div>

<h2>📦 Insumos</h2>

<div class="card">

<table>

<thead>
<tr>
<th>Nome</th>
<th>Estoque</th>
<th>Custo</th>
<th>Entrada</th>
<th>Saída</th>
</tr>
</thead>

<tbody id="listaInsumos"></tbody>

</table>

</div>

<h2>🍔 Produtos</h2>

<div class="card">

<input id="nomeProduto" placeholder="Produto">
<input id="precoProduto" placeholder="Preço">

<button onclick="cadastrarProduto()">Salvar</button>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Preço</th>
<th>Ficha</th>
<th>Venda</th>
</tr>
</thead>

<tbody id="listaProdutos"></tbody>

</table>

</div>

<h2>📊 Relatório de Consumo</h2>

<div class="card">

<table>

<thead>
<tr>
<th>Tipo</th>
<th>Quantidade</th>
<th>Data</th>
</tr>
</thead>

<tbody id="relatorio"></tbody>

</table>

</div>

<script>

const SUPABASE_URL = "https://lpmhnbmjcwtcpqdozkux.supabase.co";
const SUPABASE_KEY = "sb_publishable_-uVm2RyBtxwN0emuW5Xtwg_vt0n994I";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

async function cadastrarInsumo(){

let nome = nomeInsumo.value
let unidade = unidade.value
let estoque = parseFloat(document.getElementById("estoque").value)
let minimo = parseFloat(document.getElementById("minimo").value)
let custo = parseFloat(document.getElementById("custo").value)

await db.from("insumos").insert([
{nome, unidade, estoque, estoque_minimo:minimo, custo_unitario:custo}
])

carregar()

}

async function carregar(){

const {data:insumos} = await db.from("insumos").select("*")

listaInsumos.innerHTML=""

insumos.forEach(i=>{

let alerta = i.estoque <= i.estoque_minimo ? "alerta":""

listaInsumos.innerHTML+=`

<tr class="${alerta}">

<td>${i.nome}</td>
<td>${i.estoque}</td>
<td>${i.custo_unitario}</td>

<td>
<button onclick="entrada('${i.id}',${i.estoque})">+</button>
</td>

<td>
<button onclick="saida('${i.id}',${i.estoque})">-</button>
</td>

</tr>
`

})

carregarProdutos()
graficoEstoque(insumos)
relatorio()

}

async function entrada(id,estoque){

let q = parseFloat(prompt("Quantidade"))

await db.from("insumos")
.update({estoque:estoque+q})
.eq("id",id)

await db.from("movimentacoes")
.insert([{tipo:"entrada",insumo_id:id,quantidade:q}])

carregar()

}

async function saida(id,estoque){

let q = parseFloat(prompt("Quantidade"))

await db.from("insumos")
.update({estoque:estoque-q})
.eq("id",id)

await db.from("movimentacoes")
.insert([{tipo:"saida_insumo",insumo_id:id,quantidade:q}])

carregar()

}

async function cadastrarProduto(){

let nome = nomeProduto.value
let preco = parseFloat(precoProduto.value)

await db.from("produtos")
.insert([{nome,preco_venda:preco}])

carregarProdutos()

}

async function carregarProdutos(){

const {data} = await db.from("produtos").select("*")

listaProdutos.innerHTML=""

data.forEach(p=>{

listaProdutos.innerHTML+=`

<tr>

<td>${p.nome}</td>
<td>${p.preco_venda}</td>

<td>
<button onclick="abrirFicha('${p.id}')">
Ficha
</button>
</td>

<td>
<button onclick="venda('${p.id}')">
Venda
</button>
</td>

</tr>
`

})

}

async function venda(produtoId){

let qtd = parseInt(prompt("Quantidade vendida"))

const {data:receita} = await db
.from("ficha_tecnica")
.select("*")
.eq("produto_id",produtoId)

for(let item of receita){

let baixa = item.quantidade * qtd

const {data:insumo} = await db
.from("insumos")
.select("estoque")
.eq("id",item.insumo_id)
.single()

await db.from("insumos")
.update({estoque:insumo.estoque - baixa})
.eq("id",item.insumo_id)

await db.from("movimentacoes")
.insert([{
tipo:"saida_produto",
produto_id:produtoId,
insumo_id:item.insumo_id,
quantidade:baixa
}])

}

alert("Venda registrada")

carregar()

}

async function graficoEstoque(insumos){

let nomes = insumos.map(i=>i.nome)
let estoque = insumos.map(i=>i.estoque)

new Chart(document.getElementById("grafico"),{

type:"bar",

data:{
labels:nomes,
datasets:[{
label:"Estoque",
data:estoque
}]
}

})

}

async function relatorio(){

const {data} = await db
.from("movimentacoes")
.select("*")
.order("data",{ascending:false})

relatorio.innerHTML=""

data.forEach(r=>{

relatorio.innerHTML+=`

<tr>
<td>${r.tipo}</td>
<td>${r.quantidade}</td>
<td>${new Date(r.data).toLocaleString()}</td>
</tr>

`

})

}

carregar()

</script>

</body>
</html>
