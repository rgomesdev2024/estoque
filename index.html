<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Supabase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;}

.low-stock{background:#ffe5e5 !important;}

.unidades-alerta{
    background:#dc3545 !important;
    color:white !important;
    font-weight:bold;
    text-align:center;
}

.badge-alerta{background:#dc3545;}

/* Melhorias mobile */
@media(max-width:768px){
    h3{font-size:18px;}
    .card{padding:15px !important;}
}
</style>
</head>
<body>

<div class="container mt-4">

<h3 class="mb-3">📦 Controle de Estoque (Supabase)</h3>

<!-- FORMULÁRIO RESPONSIVO -->
<div class="card p-3 mb-3">
<div class="row g-2">

<div class="col-12 col-md-3">
<input id="nome" class="form-control" placeholder="Produto">
</div>

<div class="col-6 col-md-2">
<input id="estoque" type="number" class="form-control" placeholder="Estoque (g)">
</div>

<div class="col-6 col-md-2">
<input id="minimo" type="number" class="form-control" placeholder="Mínimo (g)">
</div>

<div class="col-6 col-md-2">
<input id="uso" type="number" class="form-control" placeholder="Uso por unidade (g)">
</div>

<div class="col-6 col-md-2 d-grid">
<button class="btn btn-primary" onclick="adicionar()">Adicionar</button>
</div>

</div>
</div>

<!-- TABELA RESPONSIVA -->
<div class="card p-3">
<div class="table-responsive">

<table class="table table-bordered table-hover align-middle text-center">

<thead class="table-dark">
<tr>
<th>Produto</th>
<th>Estoque</th>
<th class="d-none d-md-table-cell">Mínimo</th>
<th class="d-none d-md-table-cell">Uso</th>
<th>Unidades</th>
<th colspan="3">Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://lpmhnbmjcwtcpqdozkux.supabase.co";
const SUPABASE_KEY = "SUA_ANON_KEY_COMPLETA_AQUI";

const { createClient } = window.supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

const tabela = document.getElementById("tabela");

async function carregar(){
    const { data, error } = await supabaseClient
        .from("produtos")
        .select("*")
        .order("created_at");

    if(error){
        console.error(error);
        return;
    }

    render(data);
}

function render(produtos){
    tabela.innerHTML = "";

    produtos.forEach(p=>{
        let unidades = Math.floor(p.estoque / p.uso);
        let estoqueBaixo = p.estoque <= p.minimo;

        tabela.innerHTML += `
        <tr class="${estoqueBaixo ? 'low-stock':''}">
        
        <td class="text-start">
            <strong>${p.nome}</strong>
            ${estoqueBaixo ? 
                '<div><span class="badge badge-alerta mt-1">Estoque Baixo</span></div>' 
                : ''
            }
        </td>

        <td>${Number(p.estoque).toFixed(2)} g</td>

        <td class="d-none d-md-table-cell">${p.minimo} g</td>
        <td class="d-none d-md-table-cell">${p.uso} g</td>

        <td class="${estoqueBaixo ? 'unidades-alerta':'text-success fw-bold'}">
            ${unidades}
        </td>

        <td>
            <button class="btn btn-success btn-sm w-100"
            onclick="entrada('${p.id}', ${p.estoque})">+</button>
        </td>

        <td>
            <button class="btn btn-warning btn-sm w-100"
            onclick="saida('${p.id}', ${p.estoque})">-</button>
        </td>

        <td>
            <button class="btn btn-danger btn-sm w-100"
            onclick="remover('${p.id}')">X</button>
        </td>

        </tr>
        `;
    });
}

async function adicionar(){
    let nome = document.getElementById("nome").value;
    let estoque = parseFloat(document.getElementById("estoque").value);
    let minimo = parseFloat(document.getElementById("minimo").value) || 0;
    let uso = parseFloat(document.getElementById("uso").value);

    if(!nome || !estoque || !uso) 
        return alert("Preencha corretamente");

    const { error } = await supabaseClient
        .from("produtos")
        .insert([{ nome, estoque, minimo, uso }]);

    if(error){
        console.error(error);
        return alert("Erro ao inserir");
    }

    document.querySelectorAll("input").forEach(i=>i.value="");
    carregar();
}

async function entrada(id, atual){
    let valor = parseFloat(prompt("Quantidade (g):"));
    if(!valor) return;

    await supabaseClient
        .from("produtos")
        .update({ estoque: atual + valor })
        .eq("id", id);

    carregar();
}

async function saida(id, atual){
    let valor = parseFloat(prompt("Quantidade (g):"));
    if(!valor) return;

    let novo = atual - valor;
    if(novo < 0) novo = 0;

    await supabaseClient
        .from("produtos")
        .update({ estoque: novo })
        .eq("id", id);

    carregar();
}

async function remover(id){
    await supabaseClient
        .from("produtos")
        .delete()
        .eq("id", id);

    carregar();
}

carregar();

</script>

</body>
</html>
